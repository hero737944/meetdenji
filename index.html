<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meet Denji</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e63946;
      --dark: #0a0a0a;
      --card: #111111;
      --border: #222;
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(230,57,70,0.15) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid rgba(230,57,70,0.4);
      padding: 6px 14px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 18vw, 96px);
      line-height: 0.9;
      letter-spacing: 2px;
      color: var(--text);
    }

    h1 span {
      color: var(--red);
      display: block;
    }

    .subtitle {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 40px 0;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Form */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px 28px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .field {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--red);
      font-weight: 600;
      font-size: 15px;
      pointer-events: none;
    }

    input, textarea {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    input.has-prefix {
      padding-left: 30px;
    }

    input:focus, textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(230,57,70,0.1);
    }

    input::placeholder, textarea::placeholder {
      color: #444;
    }

    textarea {
      resize: none;
      height: 120px;
      line-height: 1.6;
    }

    /* Button */
    .btn {
      width: 100%;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #c1121f;
      box-shadow: 0 8px 32px rgba(230,57,70,0.3);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Status messages */
    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .status.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
      display: block;
    }

    .status.error {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.3);
      color: var(--red);
      display: block;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #333;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="tag">⚡ Open for connections</div>
    <h1>MEET<span>DENJI</span></h1>
    <p class="subtitle">Got something interesting? Drop your Telegram and tell me why you want to connect.</p>
  </div>

  <div class="divider"><span>Send a request</span></div>

  <div class="form-card">
    <div class="field">
      <label>Your Telegram Username</label>
      <div class="input-wrap">
        <span class="prefix">@</span>
        <input type="text" id="username" class="has-prefix" placeholder="yourname" autocomplete="off"/>
      </div>
    </div>

    <div class="field">
      <label>Why do you want to meet Denji?</label>
      <textarea id="reason" placeholder="Tell me what's on your mind..."></textarea>
    </div>

    <button class="btn" id="submitBtn" onclick="submitForm()">
      SEND REQUEST
    </button>

    <div class="status" id="statusMsg"></div>
  </div>

  <div class="footer">Powered by Denji World 🔥</div>

</div>

<script>
  async function submitForm() {
    const username = document.getElementById('username').value.trim();
    const reason = document.getElementById('reason').value.trim();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('statusMsg');

    // Reset
    status.className = 'status';
    status.textContent = '';

    if (!username || !reason) {
      status.className = 'status error';
      status.textContent = '⚠️ Please fill in both fields!';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>SENDING...';

    try {
      const res = await fetch('https://meetdenji-api.vercel.app/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          telegram_username: username,
          why_meet_denji: reason
        })
      });

      const data = await res.json();

      if (data.success) {
        status.className = 'status success';
        status.textContent = '✅ Request sent! Denji will reach out soon.';
        document.getElementById('username').value = '';
        document.getElementById('reason').value = '';
      } else {
        throw new Error('API error');
      }
    } catch (e) {
      status.className = 'status error';
      status.textContent = '❌ Something went wrong. Try again!';
    }

    btn.disabled = false;
    btn.innerHTML = 'SEND REQUEST';
  }
</script>

</body>
</html>
